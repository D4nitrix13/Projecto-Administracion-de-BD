services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pandas_app
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ../conf/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ../backups:/var/www/html/backups
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: pandas_kitsune_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: pandas_bd
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pandas_estampados_y_kitsune
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../sql:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  postgres_data: