services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pandas_app
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ../conf/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ../backups:/var/www/html/backups
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: pandas_estampados_y_kitsune
      DB_USERNAME: postgres
      DB_PASSWORD: root
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: pandas_bd
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pandas_estampados_y_kitsune
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - ../database/postgresql:/var/lib/postgresql
      - ../database/logs:/var/log/postgresql
      - ../database/wal_archive:/wal_archive
      - ../backups:/backups
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /wal_archive/%f && cp %p /wal_archive/%f"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/var/log/postgresql"
      - "-c"
      - "log_filename=postgresql-%Y-%m-%d.log"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pandas_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ../database/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped